{% load static %}

<!DOCTYPE html>

<html>

<head>

    <title>Payment Successful</title>

    <link
        rel="stylesheet"
        href="{% static 'css/dist/styles.css' %}"
    >

</head>

<body class="bg-base-200 flex justify-center items-center min-h-screen">

<div class="card bg-base-100 shadow-2xl w-full max-w-lg">

<div class="card-body text-center">

<h1 class="text-5xl mb-4">
✅
</h1>

<h2 class="text-3xl font-bold">

Payment Successful

</h2>

<p class="mt-4">

Invoice

</p>

<p class="text-primary text-xl font-bold">

{{ sale.invoice_number }}

</p>

<div class="divider"></div>

<div class="grid grid-cols-1 gap-3">

<a
class="btn btn-primary"
href="{% url 'invoice' sale.invoice_number %}"
target="_blank"
>

👁 Preview Invoice

</a>

<a
class="btn btn-secondary"
href="{% url 'invoice' sale.invoice_number %}?print=1"
target="_blank"
>

🖨 Print Invoice

</a>

<a
class="btn btn-outline"
href="/billing/billing/"
>

⬅ Back to Billing

</a>

</div>

</div>

</div>

</body>

</html>
